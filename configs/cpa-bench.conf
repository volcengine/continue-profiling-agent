# CPA DWARF unwind benchmark config.
# Start with:
#   sudo mkdir -p /var/log/cpa-bench
#   sudo ./cpa_static monitor --config cpa-bench.conf
#
# stack_size is set to the BPF maximum, so this config intentionally requires
# the BPF backend. If BPF capability checks fail, CPA will report the missing
# capability and exit instead of falling back to perf.

store_dir: /var/log/cpa-bench
backend: bpf
freq: 49
stack_size: 65536
bench: true
log_print_cycles: 1
