[pytest]
testpaths = tests
addopts = --import-mode=importlib
norecursedirs =
    .cache
    .pytest_cache
    .test-tmp
    build
    src/cpa_show/rust/target
markers =
    manual: tests that are only run when explicitly requested
cache_dir = .test-tmp/.pytest_cache
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s - %(levelname)s - %(message)s (%(filename)s:%(lineno)d)
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_file = .test-tmp/logs/pytest.log
log_file_level = INFO
log_file_format = %(asctime)s - %(levelname)s - %(message)s (%(filename)s:%(lineno)d)
log_file_date_format = %Y-%m-%d %H:%M:%S
